<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musa | Contact</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>

    <header>
      <nav>
        <h1>Musa</h1>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="ventures.html">Ventures</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <section id="contact-hero">
      <h2>Get In Touch</h2>
      <p>I am always open to conversations about business, technology, education and building for Africa.</p>
    </section>

    <section id="contact-details">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder = "Enter your Name">
            </div>
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder = "Enter your email">
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder = "What is this about">
            </div>
            <div class="form-group">
                <label for="message">Your Message</label>
               <textarea id="message" name="message" rows="6" placeholder = "Write your message here..."></textarea>
            </div>
            <button type="submit" class="button">Send Message</button>

        </form>
    </section>
    

    <footer>
      <p>© 2026 Musa | Built by me, with my own hands.</p>
    </footer>

    <script src="js/script.js"></script>

  </body>
</html>
